<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Отдел продаж</title>
<!-- v7-payroll-payments -->
<!--
  Отдел продаж — мини-приложение (прототип, mobile-first, стиль Telegram mini-app)
  Автономно: только vanilla JS + CSS, без внешних библиотек/CDN/шрифтов/картинок.
  Данные хранятся в localStorage под ключом "salesapp_v1" в виде JSON.
  Структура специально сделана «плоской», чтобы позже перенести в общую БД
  и подключить синхронизацию с Сипуни (Sipuni).
-->
<style>
:root{
  /* --- LIGHT CHEERFUL THEME --- */
  --bg:#f4f7fc; --bg2:#eef2fa; --card:#ffffff; --card2:#f5f8fd; --card3:#e9eefb;
  --ink:#1f2740; --ink2:#3a4463; --muted:#65708d;
  --line:rgba(31,39,64,.09); --line2:rgba(31,39,64,.15);
  /* cheerful categorical hues (light surface): manager & category colors */
  --blue:#4f6ef2; --aqua:#0ea5a4; --yellow:#e0890b; --violet:#8b5cf6; --red:#ef5a63; --orange:#f2711c;
  /* status (gauge zones / states) — readable on light */
  --good:#16a34a; --warn:#d97706; --bad:#e5484d;
  /* legacy aliases so older var() refs still resolve on light */
  --indigo:#4f6ef2; --indigo-d:#4f6ef2; --teal:#0ea5a4; --teal-d:#0f9488;
  --chip:#eef2fb; --shadow:0 8px 24px rgba(31,45,90,.10);
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#eef3fb 0%,#f6f8fc 100%); background-attachment:fixed;
  color:var(--ink); font-size:16px; line-height:1.4;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:transparent}
header.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(120deg,#5b6ef5 0%,#7c5cf0 58%,#3fb6c8 100%);
  color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0;box-shadow:0 6px 20px rgba(79,110,242,.30);
}
header.topbar .ttl{font-weight:800;font-size:18px;letter-spacing:.2px}
header.topbar .sub{font-size:12px;opacity:.82;margin-top:1px}
header.topbar button.logout{
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.16);color:#fff;padding:7px 12px;border-radius:10px;
  font-size:13px;font-weight:600;
}
main{flex:1;padding:14px 14px 92px 14px}
.note{
  background:rgba(79,110,242,.08);border:1px solid rgba(79,110,242,.22);color:#3f4a63;border-radius:12px;
  padding:9px 12px;font-size:12.5px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;
}
.note b{color:#2a3350}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:15px;color:var(--ink)}
.row{display:flex;gap:10px}
.row>*{flex:1}
h2.screen-title{font-size:20px;margin:2px 0 12px;color:var(--ink);font-weight:800}
label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px;font-weight:600}
input,select{
  width:100%;padding:12px;border:1px solid var(--line2);border-radius:12px;font-size:16px;
  background:var(--bg2);color:var(--ink);outline:none;
}
select{appearance:none}
input:focus,select:focus{border-color:var(--blue);background:#ffffff;box-shadow:0 0 0 3px rgba(79,110,242,.14)}
input::placeholder{color:#9aa3b8}
.hint{font-size:11.5px;color:var(--muted);margin-top:3px}
button{cursor:pointer;font-family:inherit}
.btn{
  display:block;width:100%;padding:14px;border:0;border-radius:14px;font-size:16px;font-weight:700;
  background:var(--blue);color:#fff;margin-top:10px;box-shadow:0 8px 20px rgba(79,110,242,.28);
}
.btn:active{transform:translateY(1px)}
.btn.teal{background:var(--aqua);box-shadow:0 8px 20px rgba(14,165,164,.28)}
.btn.ghost{background:var(--card2);color:var(--blue);border:1px solid var(--line2);box-shadow:none}
.btn.warn{background:rgba(229,72,77,.10);color:var(--bad);border:1px solid rgba(229,72,77,.28);box-shadow:none}
.btn.sm{padding:9px 12px;font-size:13px;width:auto;margin:0;display:inline-block}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--chip);color:var(--ink2);border:1px solid var(--line)}
.pill.good{background:rgba(22,163,74,.12);color:#15803d;border-color:rgba(22,163,74,.30)}
.pill.bad{background:rgba(229,72,77,.12);color:#c62d34;border-color:rgba(229,72,77,.30)}
.pill.warn{background:rgba(245,158,11,.14);color:#b45309;border-color:rgba(245,158,11,.32)}
/* period toggle */
.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px}
.seg button{flex:1;border:0;background:transparent;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(31,45,90,.14)}
/* KPI grid */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.kpi{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}
.kpi .k-lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.25}
.kpi .k-val{font-size:20px;font-weight:800;margin-top:4px;letter-spacing:-.3px}
.kpi.big .k-val{font-size:19px}
.kpi-grid .k-val{font-size:18px}
.kpi-grid .kpi.big .k-val{font-size:19px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi .k-delta{font-size:12px;font-weight:800;margin-top:3px}
.k-delta.up{color:var(--good)} .k-delta.down{color:var(--bad)}
/* progress bar */
.bar{height:10px;background:rgba(31,39,64,.08);border-radius:999px;overflow:hidden;margin-top:8px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--aqua));border-radius:999px}
.bar.warn>span{background:linear-gradient(90deg,var(--warn),var(--bad))}
.mgr-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px;margin-bottom:10px}
.mgr-head{display:flex;align-items:center;gap:12px}
.mgr-ring{flex:none;line-height:0;width:118px}
.gauge-legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:2px}
.gauge-legend b{font-size:15px;line-height:1}
.mgr-card .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.mgr-card .nm{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px}
.mgr-card .nm i{width:10px;height:10px;border-radius:3px;flex:none;display:inline-block}
.mini{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:10px;font-size:12.5px}
.mini div span{color:var(--muted)}
.mini div b{float:right;font-weight:700;color:var(--ink)}
/* leader / trophy tile */
.leader{background:linear-gradient(135deg,#ece9ff 0%,#e4f7f1 100%);border:1px solid rgba(139,92,246,.30);
  border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.leader .tro{font-size:40px;line-height:1;filter:drop-shadow(0 4px 10px rgba(124,92,240,.28))}
.leader .l-cap{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#7c5cf0;font-weight:700}
.leader .l-nm{font-size:18px;font-weight:800;margin-top:2px;color:var(--ink)}
.leader .l-amt{font-size:24px;font-weight:800;color:#d97706;margin-top:2px;letter-spacing:-.4px}
.leader .l-sub{font-size:11.5px;color:var(--muted);margin-top:1px}
.chart-cap{font-size:11px;color:var(--muted);margin:0 0 2px}
/* role gate */
.gate{padding:24px 16px}
.gate .big{font-size:26px;font-weight:800;text-align:center;margin:20px 0 4px;color:var(--ink)}
.gate .who{text-align:center;color:var(--muted);margin-bottom:24px}
.role-btn{
  display:flex;align-items:center;gap:14px;width:100%;padding:18px;border:1px solid var(--line2);border-radius:16px;
  background:var(--card);box-shadow:var(--shadow);margin-bottom:12px;font-size:17px;font-weight:700;color:var(--ink);text-align:left;
}
.role-btn .emo{font-size:26px}
.role-btn .arw{margin-left:auto;color:var(--muted)}
/* nav */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;
  background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line2);box-shadow:0 -4px 18px rgba(31,45,90,.06);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom,0);
}
nav.tabbar button{
  flex:1;border:0;background:transparent;padding:9px 2px;font-size:10.5px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600;
}
nav.tabbar button .ic{font-size:20px}
nav.tabbar button.on{color:var(--blue)}
/* list rows */
.lrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:10px}
.lrow:last-child{border-bottom:0}
.lrow .l-main{font-weight:600;font-size:14px;color:var(--ink)}
.lrow .l-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tag{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:700;background:var(--chip);color:var(--ink2)}
.tag.pat{background:rgba(79,110,242,.14);color:#3a52c4}
.tag.doc{background:rgba(14,165,164,.16);color:#0b7d7c}
.tag.ret{background:rgba(229,72,77,.14);color:#c62d34}
.x{border:0;background:rgba(229,72,77,.12);color:var(--bad);border-radius:9px;width:34px;height:34px;font-size:16px;font-weight:800;flex:none}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,28,50,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);width:100%;max-width:520px;border:1px solid var(--line2);border-bottom:0;border-radius:20px 20px 0 0;padding:18px 16px 26px;box-shadow:0 -8px 40px rgba(31,45,90,.28)}
.modal h3{margin:2px 0 6px;font-size:17px;color:var(--ink)}
.seg-2{display:flex;gap:8px;margin-top:4px}
.seg-2 button{flex:1;padding:11px;border:1px solid var(--line2);background:var(--bg2);border-radius:12px;font-weight:700;color:var(--muted);font-size:14px}
.seg-2 button.on{border-color:var(--blue);background:rgba(79,110,242,.12);color:var(--blue)}
/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
.cal .dh{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:4px 0}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px;font-weight:600;background:var(--card3);color:var(--ink)}
.cal .d.off{background:#eef1f6;color:#98a1b5}                /* выходной/праздник */
.cal .d.hol{background:rgba(229,72,77,.16);color:#c62d34}   /* праздник РК */
.cal .d.pers{background:rgba(245,158,11,.20);color:#b45309} /* личный выходной */
.cal .d.today{outline:2px solid var(--blue)}
.cal .d.empty{background:transparent}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11.5px;color:var(--muted)}
.legend i{display:inline-block;width:12px;height:12px;border-radius:4px;margin-right:4px;vertical-align:-1px}
.split{display:flex;gap:8px;margin-top:10px}
.split .s-cat{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.split .s-cat .s-v{font-weight:800;font-size:16px;color:var(--ink)}
.split .s-cat .s-l{font-size:11.5px;color:var(--muted)}
.split .s-cat .s-l i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:0}
.empty-state{text-align:center;color:var(--muted);padding:24px 8px;font-size:14px}
.small-note{font-size:11px;color:var(--muted);text-align:center;margin-top:18px}
.divider{height:1px;background:var(--line);margin:12px 0}
.addbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:6px}
.tot-strong{font-size:22px;font-weight:800;color:var(--ink)}
/* month navigator */
.mnav{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px 6px;margin-bottom:12px;gap:8px}
.mnav-btn{border:0;background:#fff;color:var(--blue);width:38px;height:38px;border-radius:10px;font-size:22px;font-weight:800;line-height:1;box-shadow:0 2px 8px rgba(31,45,90,.10);display:flex;align-items:center;justify-content:center;flex:none}
.mnav-btn:active{transform:translateY(1px)}
.mnav-btn.hidden{visibility:hidden;pointer-events:none}
.mnav-lbl{flex:1;text-align:center;font-weight:800;font-size:15px;color:var(--ink)}
/* rating / leaderboard */
.rank{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.rank.top{background:linear-gradient(135deg,#fff7e6 0%,#fef3d7 100%);border-color:rgba(224,137,11,.38)}
.rank .plc{width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border-radius:12px;background:var(--card3);color:var(--ink2)}
.rank .plc.medal{background:transparent;font-size:27px}
.rank .r-body{flex:1;min-width:0}
.rank .r-nm{font-weight:800;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank .r-sub{font-size:12px;color:var(--muted);margin-top:2px}
.rank .r-amt{font-weight:800;font-size:16px;color:var(--ink);text-align:right;white-space:nowrap}
.rank.top .r-amt{color:#d97706}
.mlead{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.mlead:last-child{border-bottom:0}
.mlead .m-mo{font-weight:700;font-size:13.5px;color:var(--ink);width:118px;flex:none}
.mlead .m-nm{flex:1;color:var(--ink2);font-size:13.5px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mlead .m-amt{font-weight:800;font-size:13.5px;color:#d97706;white-space:nowrap}
</style>

<div id="app">
  <header class="topbar" id="topbar" style="display:none">
    <div>
      <div class="ttl">Отдел продаж</div>
      <div class="sub" id="whoami"></div>
    </div>
    <button class="logout" onclick="logout()">Выйти</button>
  </header>
  <main id="view"></main>
  <nav class="tabbar" id="tabbar" style="display:none"></nav>
</div>

<script>
"use strict";
/* ============================================================
   ХРАНИЛИЩЕ
   ============================================================ */
const LS_KEY = "salesapp_v1";

function defaultData(){
  return {
    config:{
      pinAdmin:"1111",   // PIN «Руководителя» (меняется в настройках)
      managers:[
        {id:"m1",name:"Менеджер 1"},
        {id:"m2",name:"Менеджер 2"},
        {id:"m3",name:"Менеджер 3"}
      ],
      deptPlan:0            // общий план отдела (0 = считать как сумму личных)
    },
    plans:{},              // { managerId:{monthPlan} }
    entries:[],            // записи по дням
    help:[],               // обращения "нужна помощь руководителя"
    daysOff:{},            // { managerId:['YYYY-MM-DD',...] }
    bonus:{}               // { managerId:{ 'YYYY-MM': премия ₸ } } — ручная премия (РОП/руководитель)
  };
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultData();
    const d = JSON.parse(raw);
    // мягкая миграция недостающих полей
    const base = defaultData();
    d.config = Object.assign(base.config, d.config||{});
    d.plans = d.plans||{}; d.entries=d.entries||[]; d.help=d.help||[]; d.daysOff=d.daysOff||{};
    d.bonus = d.bonus||{};
    return d;
  }catch(e){ return defaultData(); }
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
let DB = load();

/* сессия (роль) хранится отдельно */
const SESS_KEY = "salesapp_v1_session";
let SESSION = JSON.parse(localStorage.getItem(SESS_KEY)||"null"); // {role:'boss'|'manager', managerId?}
// миграция старых ролей: Админ и РОП -> единый «Руководитель» (boss)
if(SESSION && (SESSION.role==="admin"||SESSION.role==="rop")){ SESSION={role:"boss"}; localStorage.setItem(SESS_KEY, JSON.stringify(SESSION)); }
function setSession(s){ SESSION=s; localStorage.setItem(SESS_KEY, JSON.stringify(s)); }
function clearSession(){ SESSION=null; localStorage.removeItem(SESS_KEY); }

/* ============================================================
   ДАТЫ / КАЛЕНДАРЬ КАЗАХСТАНА
   ============================================================ */
// Праздники-нерабочие даты РК 2026 (встроено).
// ВНИМАНИЕ: возможны переносы выходных — менеджер правит вручную в «Мой календарь».
const KZ_HOLIDAYS_2026 = [
  "2026-01-01","2026-01-02", // Новый год
  "2026-01-07",              // Православное Рождество
  "2026-03-08",              // Женский день
  "2026-03-21","2026-03-22","2026-03-23", // Наурыз
  "2026-05-01",              // Единство народа
  "2026-05-07",              // День защитника Отечества
  "2026-05-09",              // День Победы
  "2026-07-06",              // День столицы
  "2026-08-30",              // День Конституции
  "2026-10-25",              // День Республики
  "2026-12-16","2026-12-17"  // День Независимости
];
const HOL_SET = new Set(KZ_HOLIDAYS_2026);

function pad(n){ return n<10? "0"+n : ""+n; }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayStr(){ return ymd(new Date()); }
function parseYMD(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }

function isWeekend(d){ const w=d.getDay(); return w===0||w===6; }
function isHoliday(dateStr){ return HOL_SET.has(dateStr); }
// Рабочий день = будний, не праздник РК, не личный выходной менеджера
function isWorkingDay(dateStr, managerId){
  const d=parseYMD(dateStr);
  if(isWeekend(d)) return false;
  if(isHoliday(dateStr)) return false;
  if(managerId && (DB.daysOff[managerId]||[]).includes(dateStr)) return false;
  return true;
}
// список дат месяца
function monthDates(year, month){ // month:0-based
  const res=[]; const dim=new Date(year,month+1,0).getDate();
  for(let i=1;i<=dim;i++) res.push(ymd(new Date(year,month,i)));
  return res;
}
function fmtMoney(n){
  n = Math.round(n||0);
  return n.toLocaleString("ru-RU") + " ₸";
}
function pct(part, whole){ if(!whole) return 0; return Math.round(part/whole*100); }

/* ---- выбранный месяц (SEL_MONTH) для периода «Месяц» ---- */
const RU_MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
function curMonthStr(){ const n=new Date(); return n.getFullYear()+"-"+pad(n.getMonth()+1); } // 'YYYY-MM'
let SEL_MONTH = curMonthStr();
function monthLabel(ms){ const [y,m]=ms.split("-").map(Number); return RU_MONTHS[m-1]+" "+y; }
function monthDatesStr(ms){ const [y,m]=ms.split("-").map(Number); return monthDates(y, m-1); }
function shiftMonth(ms, delta){ let [y,m]=ms.split("-").map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+"-"+pad(m); }
function selMonthPrev(){ SEL_MONTH=shiftMonth(SEL_MONTH,-1); render(); }
function selMonthNext(){ if(SEL_MONTH>=curMonthStr()) return; SEL_MONTH=shiftMonth(SEL_MONTH,1); render(); } // не уходим за текущий месяц

/* период -> набор дат */
function datesForPeriod(period){
  const now=new Date();
  if(period==="today") return [todayStr()];
  if(period==="yesterday"){ const y=new Date(now); y.setDate(y.getDate()-1); return [ymd(y)]; }
  if(period==="week"){ // последние 7 дней
    const arr=[]; for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); arr.push(ymd(d)); } return arr;
  }
  // month = выбранный месяц SEL_MONTH (по умолчанию — текущий)
  return monthDatesStr(SEL_MONTH);
}

/* ============================================================
   РАСЧЁТЫ
   ============================================================ */
function entriesFor(managerId, dateSet){
  return DB.entries.filter(e=> e.managerId===managerId && dateSet.has(e.date));
}
// продажи: сумма без возвратов минус возвраты (ВАЛОВАЯ, до комиссии банка)
function salesSum(entries){
  let s=0;
  entries.forEach(e=> (e.sales||[]).forEach(x=>{
    if(x.isReturn) s -= Number(x.amount)||0; else s += Number(x.amount)||0;
  }));
  return s;
}
/* --- Способ оплаты и комиссия банка/эквайринга (вычитается из суммы -> нетто) --- */
const PAY_COMMISSION = {plain:0, kaspi24:0.155, kaspi12:0.15, robokassa:0.035};
const PAY_LABEL = {plain:"Обычная", kaspi24:"Каспи рассрочка 0024", kaspi12:"Каспи рассрочка 0012", robokassa:"Робокасса"};
// нетто одной продажи (после комиссии); возврат остаётся отрицательным
function saleNet(sale){
  const pay=(sale&&sale.pay)||'plain';
  const comm=PAY_COMMISSION[pay]!=null? PAY_COMMISSION[pay] : 0;
  return (sale&&sale.isReturn?-1:1) * (Number(sale&&sale.amount)||0) * (1-comm);
}
// нетто-сумма по записям с необязательным фильтром продаж
function netSum(entries, filterFn){
  let s=0;
  entries.forEach(e=> (e.sales||[]).forEach(x=>{ if(!filterFn || filterFn(x)) s+=saleNet(x); }));
  return s;
}
// количество оплат (продажа с isReturn=false)
function payCount(entries){
  let c=0; entries.forEach(e=> (e.sales||[]).forEach(x=>{ if(!x.isReturn) c++; })); return c;
}
// средний чек = сумма оплат(без возвратов) / кол-во оплат
function avgCheck(entries){
  let sum=0,c=0;
  entries.forEach(e=> (e.sales||[]).forEach(x=>{ if(!x.isReturn){ sum+=Number(x.amount)||0; c++; } }));
  return c? sum/c : 0;
}
function sumField(entries, path){ // например 'sipuni.talkMin'
  const [a,b]=path.split(".");
  let s=0; entries.forEach(e=>{ const v=b? (e[a]&&e[a][b]) : e[a]; s+=Number(v)||0; }); return s;
}
function categorySplit(entries){
  let pat=0, doc=0;
  entries.forEach(e=> (e.sales||[]).forEach(x=>{
    const amt=(x.isReturn? -1:1)*(Number(x.amount)||0);
    if(x.category==="doctors") doc+=amt; else pat+=amt;
  }));
  return {pat,doc};
}
// План по умолчанию для каждого менеджера = 5 000 000 ₸ (минимум)
const DEFAULT_PLAN = 5000000;
function managerPlan(managerId){
  const v=Number((DB.plans[managerId]||{}).monthPlan);
  return v>0? v : DEFAULT_PLAN;
}
/* --- Премия (ручная, за месяц) --- */
function managerBonus(managerId, monthStr){ return Number(((DB.bonus||{})[managerId]||{})[monthStr])||0; }
// число рабочих дней месяца, по которым есть отчёт (запись) менеджера
function reportDaysCount(managerId, monthStr){
  const workSet=new Set(monthDatesStr(monthStr).filter(ds=>isWorkingDay(ds, managerId)));
  const days=new Set();
  DB.entries.forEach(e=>{ if(e.managerId===managerId && workSet.has(e.date)) days.add(e.date); });
  return days.size;
}
// ставка % за предоплаты с вебинара по нетто-сумме P
function prepayTierRate(P){ if(P<5000000) return 0.05; if(P<7000000) return 0.06; return 0.08; }
// Доход менеджера за месяц (все проценты — от НЕТТО, после комиссии банка)
function managerIncome(managerId, monthStr){
  monthStr = monthStr || SEL_MONTH;
  const ent = entriesFor(managerId, new Set(monthDatesStr(monthStr)));
  const reportDays = reportDaysCount(managerId, monthStr);
  const oklad = reportDays>=21 ? 50000 : 0;
  // Предоплаты с вебинара: пациенты + предоплата
  const P = netSum(ent, x=> x.category!=="doctors" && x.prepay);
  const prepayRate = prepayTierRate(P);
  const commPrepay = prepayRate * P;
  // Не-предоплаты: пациенты без предоплаты — 12%
  const nonPre = netSum(ent, x=> x.category!=="doctors" && !x.prepay);
  const commNonPre = 0.12 * nonPre;
  // Врачи — 6%
  const docs = netSum(ent, x=> x.category==="doctors");
  const commDoc = 0.06 * docs;
  const bonus = managerBonus(managerId, monthStr);
  const total = oklad + commPrepay + commNonPre + commDoc + bonus;
  return {reportDays, oklad, P, prepayRate, commPrepay, nonPre, commNonPre, docs, commDoc, bonus, total};
}

// рабочие дни месяца для менеджера: прошедшие (<= сегодня) и всего
function workingDaysStats(managerId, monthStr){
  const all=monthDatesStr(monthStr || curMonthStr());
  const today=todayStr();
  let total=0, passed=0, remaining=0;
  all.forEach(ds=>{
    if(isWorkingDay(ds, managerId)){
      total++;
      if(ds < today) passed++;            // строго прошедшие (без сегодня)
      if(ds >= today) remaining++;        // включая сегодня
    }
  });
  return {total, passed, remaining};
}

/* ============================================================
   ВИЗУАЛИЗАЦИИ (инлайновый SVG, без библиотек)
   ============================================================ */
function clampNum(v,a,b){ return Math.max(a, Math.min(b, v)); }
// статус-цвет по выполнению плана (light-safe, читаемый на белом: красный / янтарный / зелёный)
function zoneColor(p){ if(p<50) return "#e5484d"; if(p<100) return "#d97706"; return "#15803d"; }
// категориальная палитра менеджеров (validated на светлом фоне, фиксированный порядок)
const MGR_COLORS=["#4f6ef2","#0ea5a4","#e0890b","#8b5cf6","#ef5a63","#f2711c"];
function mgrColor(i){ return MGR_COLORS[i % MGR_COLORS.length]; }
// категории продаж — единая пара во всём приложении
const CAT_COLOR={patients:"#4f6ef2", doctors:"#0ea5a4"};

// компактный формат денег для подписей на графиках
function compactMoney(n){
  n=Math.round(n||0); const sign=n<0?"−":""; n=Math.abs(n);
  if(n>=1e6) return sign+(n/1e6).toFixed((n%1e6)===0?0:1).replace(".",",")+" млн";
  if(n>=1e3) return sign+Math.round(n/1e3)+"К";
  return sign+n;
}
function shortName(s){ s=String(s||""); const w=s.split(/\s+/)[0]; return w.length>9? w.slice(0,9)+"…" : (s.length>11? s.slice(0,11)+"…" : s); }

// Полукруглый BI-гейдж выполнения плана (0–150%) в «жирном» стиле:
// ТОЛСТАЯ дуга с крупными зонами красный→янтарный→зелёный, числовая шкала
// (0,25,50,75,100,125,150), жирная стрелка-указатель «сейчас», тонкая тёмная
// метка «прогноз» и большое % под центром. opts.size:'lg'(деф.)|'sm'.
function gaugeSVG(curPct, forePct, opts){
  opts=opts||{}; const big = opts.size!=="sm";
  const maxV=150;
  const cx   = big?160:72;
  const Ro   = big?132:60;          // внешний радиус полосы
  const thick= big?32:15;           // толщина полосы (жирная!)
  const cy   = Ro + (big?30:9);
  const W    = cx*2;
  const H    = cy + (big?84:30);
  const rMid = Ro - thick/2;        // середина полосы (по ней рисуем дуги)
  const Ri   = Ro - thick;          // внутренний радиус полосы
  const a  = v=>Math.PI*(1-clampNum(v,0,maxV)/maxV);
  const pt = (v,r)=>[cx+r*Math.cos(a(v)), cy-r*Math.sin(a(v))];
  const arc=(v1,v2,r,color,sw,cap)=>{ const [x1,y1]=pt(v1,r),[x2,y2]=pt(v2,r);
    return `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="${cap||'butt'}"/>`; };
  // яркие BI-цвета полосы + читаемый цвет для стрелки/числа
  const RED="#e5484d", AMB="#f5a623", GRN="#22b07d";
  const col = zoneColor(curPct);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${big?340:150}px;display:block;margin:0 auto" role="img" aria-label="Выполнение плана ${Math.round(curPct)}%">`;
  // толстые цветные зоны (маленькие зазоры между секторами -> белые «спицы»)
  s+=arc(0,49,rMid,RED,thick,"butt");
  s+=arc(51,99,rMid,AMB,thick,"butt");
  s+=arc(101,maxV,rMid,GRN,thick,"butt");
  // числовая шкала + насечки
  const ticks = big?[0,25,50,75,100,125,150]:[0,50,100,150];
  ticks.forEach(v=>{
    const [t1x,t1y]=pt(v,Ro), [t2x,t2y]=pt(v,Ro-(big?6:3));
    s+=`<line x1="${t1x.toFixed(1)}" y1="${t1y.toFixed(1)}" x2="${t2x.toFixed(1)}" y2="${t2y.toFixed(1)}" stroke="#ffffff" stroke-width="${big?2:1.2}"/>`;
    const [lx,ly]=pt(v, Ro + (big?15:9));
    s+=`<text x="${lx.toFixed(1)}" y="${(ly+(big?4:3)).toFixed(1)}" text-anchor="middle" font-size="${big?12:9}" font-weight="700" fill="#5f6b88">${v}</text>`;
  });
  // метка «прогноз» — тонкий тёмный указатель поперёк полосы + точка
  if(forePct!=null){
    const [f1x,f1y]=pt(forePct, Ro+(big?3:2)), [f2x,f2y]=pt(forePct, Ri-(big?3:2));
    s+=`<line x1="${f1x.toFixed(1)}" y1="${f1y.toFixed(1)}" x2="${f2x.toFixed(1)}" y2="${f2y.toFixed(1)}" stroke="#1f2740" stroke-width="${big?3:2}" stroke-linecap="round" opacity=".85"/>`;
    s+=`<circle cx="${f1x.toFixed(1)}" cy="${f1y.toFixed(1)}" r="${big?3.4:2}" fill="#1f2740"/>`;
  }
  // жирная стрелка-указатель «сейчас» (каплевидный указатель)
  const an=a(curPct);
  const dx=Math.cos(an), dy=-Math.sin(an);      // направление к текущему значению
  const px=Math.sin(an), py=Math.cos(an);       // перпендикуляр
  const nLen = Ri + thick*0.62;                 // кончик заходит в полосу
  const halfW= big?9:4.5, back = big?15:7;      // ширина у основания и «хвост»
  const tipX=cx+dx*nLen,  tipY=cy+dy*nLen;
  const bLx =cx+px*halfW-dx*back, bLy=cy+py*halfW-dy*back;
  const bRx =cx-px*halfW-dx*back, bRy=cy-py*halfW-dy*back;
  s+=`<polygon points="${tipX.toFixed(1)},${tipY.toFixed(1)} ${bLx.toFixed(1)},${bLy.toFixed(1)} ${bRx.toFixed(1)},${bRy.toFixed(1)}" fill="${col}"/>`;
  // ступица
  s+=`<circle cx="${cx}" cy="${cy}" r="${big?12:6}" fill="${col}"/><circle cx="${cx}" cy="${cy}" r="${big?6:3}" fill="#ffffff"/>`;
  // большое число под центром
  s+=`<text x="${cx}" y="${(cy+(big?54:24)).toFixed(1)}" text-anchor="middle" font-size="${big?42:18}" font-weight="800" fill="${col}">${Math.round(curPct)}%</text>`;
  if(big) s+=`<text x="${cx}" y="${(cy+72).toFixed(1)}" text-anchor="middle" font-size="12" fill="#5f6b88">выполнение плана</text>`;
  s+=`</svg>`;
  return s;
}

// Дневной столбчатый график продаж за текущий месяц (стек: Пациенты / Врачи)
function monthBarSVG(mid){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth();
  const dim=new Date(y,mo+1,0).getDate();
  const patArr=[], docArr=[]; let max=0, any=false;
  for(let day=1;day<=dim;day++){
    const ds=ymd(new Date(y,mo,day));
    let pat=0, doc=0;
    DB.entries.filter(e=>e.managerId===mid && e.date===ds).forEach(e=> (e.sales||[]).forEach(x=>{
      const amt=(x.isReturn?-1:1)*(Number(x.amount)||0);
      if(x.category==="doctors") doc+=amt; else pat+=amt;
    }));
    pat=Math.max(0,pat); doc=Math.max(0,doc);
    patArr.push(pat); docArr.push(doc);
    const t=pat+doc; if(t>0) any=true; if(t>max) max=t;
  }
  if(!any) return `<div class="empty-state">нет данных за месяц</div>`;
  const padL=8, padR=8, padT=18, padB=18, rowH=142, plotH=rowH-padT-padB;
  const W=Math.max(288, dim*11 + padL+padR), plotW=W-padL-padR;
  const colW=plotW/dim, bw=Math.min(14, colW*0.72);
  let bars="";
  for(let i=0;i<dim;i++){
    const x=padL + i*colW + (colW-bw)/2;
    const ph=patArr[i]/max*plotH, dh=docArr[i]/max*plotH;
    const yPat=padT+plotH-ph, yDoc=yPat-dh-(ph>0&&dh>0?2:0); // 2px зазор между сегментами
    if(ph>0) bars+=`<rect x="${x.toFixed(1)}" y="${yPat.toFixed(1)}" width="${bw.toFixed(1)}" height="${ph.toFixed(1)}" rx="2" fill="${CAT_COLOR.patients}"/>`;
    if(dh>0) bars+=`<rect x="${x.toFixed(1)}" y="${yDoc.toFixed(1)}" width="${bw.toFixed(1)}" height="${dh.toFixed(1)}" rx="2" fill="${CAT_COLOR.doctors}"/>`;
    if((i+1)%5===0) bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${rowH-5}" text-anchor="middle" font-size="9" fill="#5f6b88">${i+1}</text>`;
  }
  bars+=`<line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="rgba(31,39,64,.14)"/>`;
  bars+=`<text x="${padL}" y="${padT-5}" font-size="9.5" fill="#5f6b88">макс за день: ${fmtMoney(max)}</text>`;
  return `<div style="overflow-x:auto;margin-top:4px"><svg width="${W}" height="${rowH}" viewBox="0 0 ${W} ${rowH}" style="min-width:100%">${bars}</svg></div>
    <div class="legend"><span><i style="background:${CAT_COLOR.patients}"></i>Пациенты</span><span><i style="background:${CAT_COLOR.doctors}"></i>Врачи</span></div>`;
}

// Цветной столбчатый график продаж по менеджерам за выбранный период (1 столбец = 1 менеджер)
function mgrBarsSVG(dateSet){

// Плавная линия по точкам (Catmull-Rom → Безье)
function smoothPath(P){
  if(!P.length) return "";
  if(P.length<3) return "M"+P.map(p=>`${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" L");
  let d=`M${P[0][0].toFixed(1)} ${P[0][1].toFixed(1)}`;
  for(let i=0;i<P.length-1;i++){
    const p0=P[i-1]||P[i], p1=P[i], p2=P[i+1], p3=P[i+2]||P[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}

// Динамика продаж отдела по дням текущего месяца (плавная area-линия)
function deptTrendSVG(monthStr){
  const [my,mm]=(monthStr||curMonthStr()).split("-").map(Number);
  const y=my, mo=mm-1;
  const dim=new Date(y,mo+1,0).getDate(), today=todayStr();
  const vals=[]; let max=0, any=false;
  for(let day=1;day<=dim;day++){
    const ds=ymd(new Date(y,mo,day));
    if(ds>today){ vals.push(null); continue; }
    let t=0; DB.config.managers.forEach(m=>{ t+=salesSum(DB.entries.filter(e=>e.managerId===m.id && e.date===ds)); });
    t=Math.max(0,t); vals.push(t); if(t>0) any=true; if(t>max) max=t;
  }
  if(!any) return `<div class="empty-state">нет данных за месяц</div>`;
  const padL=10, padR=12, padT=18, padB=22, rowH=168, plotH=rowH-padT-padB;
  const W=Math.max(300, dim*10 + padL+padR), plotW=W-padL-padR, base=padT+plotH;
  const xAt=i=> padL + (dim<=1?plotW/2 : i/(dim-1)*plotW);
  const yAt=v=> padT + plotH - (v/max*plotH);
  const pts=[]; vals.forEach((v,i)=>{ if(v!=null) pts.push([xAt(i), yAt(v)]); });
  const uid="g"+Math.floor(Math.random()*1e6);
  let g=`<defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#4f6ef2" stop-opacity="0.34"/><stop offset="1" stop-color="#4f6ef2" stop-opacity="0"/></linearGradient></defs>`;
  // сетка: 0 / max/2 / max
  [0,0.5,1].forEach(f=>{ const yy=base-f*plotH;
    g+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="rgba(31,39,64,.08)"/>`;
    g+=`<text x="${W-padR}" y="${(yy-3).toFixed(1)}" text-anchor="end" font-size="9" fill="#5f6b88">${compactMoney(max*f)}</text>`; });
  const line=smoothPath(pts);
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${base.toFixed(1)} L${pts[0][0].toFixed(1)} ${base.toFixed(1)} Z`;
  g+=`<path d="${area}" fill="url(#${uid})"/>`;
  g+=`<path d="${line}" fill="none" stroke="#4f6ef2" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  // подписи дней (каждый 5-й)
  for(let i=0;i<dim;i++){ if((i+1)%5===0 || i===dim-1){ const x=xAt(i);
    g+=`<text x="${x.toFixed(1)}" y="${(rowH-6).toFixed(1)}" text-anchor="middle" font-size="9" fill="#5f6b88">${i+1}</text>`; } }
  // конечная точка + значение
  const last=pts[pts.length-1], lastV=vals.filter(v=>v!=null).slice(-1)[0];
  g+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4.5" fill="#4f6ef2" stroke="#ffffff" stroke-width="2"/>`;
  g+=`<text x="${(last[0]).toFixed(1)}" y="${(last[1]-9).toFixed(1)}" text-anchor="end" font-size="10.5" font-weight="800" fill="#1f2740">${compactMoney(lastV)}</text>`;
  return `<div style="overflow-x:auto"><svg width="${W}" height="${rowH}" viewBox="0 0 ${W} ${rowH}" style="min-width:100%">${g}</svg></div>`;
}

/* ============================================================
   РЕНДЕР — маршрутизация
   ============================================================ */
let ROUTE = null;
let PERIOD = "today";

function render(){
  const topbar=document.getElementById("topbar");
  const tabbar=document.getElementById("tabbar");
  if(!SESSION){ topbar.style.display="none"; tabbar.style.display="none"; renderGate(); return; }
  topbar.style.display="flex"; tabbar.style.display="flex";
  document.getElementById("whoami").textContent = whoLabel();
  if(!ROUTE) ROUTE = defaultRoute();
  renderTabs();
  const v=document.getElementById("view");
  v.innerHTML="";
  switch(ROUTE){
    case "dashboard": renderDashboard(v); break;
    case "cabinet":   renderCabinet(v); break;
    case "entry":     renderEntry(v); break;
    case "plans":     renderPlans(v); break;
    case "rating":    renderRating(v); break;
    case "history":   renderHistory(v); break;
    case "calendar":  renderCalendar(v); break;
    case "settings":  renderSettings(v); break;
    default: renderDashboard(v);
  }
  window.scrollTo(0,0);
}
function whoLabel(){
  if(SESSION.role==="boss") return "Руководитель";
  return "Менеджер · "+managerName(SESSION.managerId);
}
function isBoss(){ return SESSION.role==="boss"; }
function defaultRoute(){ return isBoss()? "dashboard" : "cabinet"; }

function renderTabs(){
  const tabs = isBoss()
    ? [["dashboard","📊","Дашборд"],["plans","🎯","Планы"],["rating","🏆","Рейтинг"],["calendar","📅","Календарь"],["history","🗂","История"],["settings","⚙️","Настройки"]]
    : [["cabinet","🏠","Кабинет"],["entry","✍️","Ввод"],["calendar","📅","Календарь"],["history","🗂","История"]];
  const bar=document.getElementById("tabbar");
  bar.innerHTML="";
  tabs.forEach(([r,ic,lbl])=>{
    const b=document.createElement("button");
    b.className = ROUTE===r? "on":"";
    b.innerHTML=`<span class="ic">${ic}</span>${lbl}`;
    b.onclick=()=>{ ROUTE=r; render(); };
    bar.appendChild(b);
  });
}
function go(r){ ROUTE=r; render(); }
function logout(){ clearSession(); ROUTE=null; render(); }

  DB.config.managers.forEach(m=>{
    const ep=entriesFor(m.id, dates);
    periodEntries=periodEntries.concat(ep);
    deptSoldPeriod += salesSum(ep);
    const em=entriesFor(m.id, monthSet);
    deptSoldMonth  += salesSum(em);
    deptNetMonth   += netSum(em);

  const deptPct=pct(deptSoldMonth, deptPlan);
  const remain=Math.max(0, deptPlan-deptSoldMonth);
  // прогноз отдела = сумма прогнозов менеджеров
  let deptForecast=0;
  DB.config.managers.forEach(m=>{
    const wd=workingDaysStats(m.id, SEL_MONTH); const sm=salesSum(entriesFor(m.id,monthSet));
    deptForecast += wd.passed>0? (sm/wd.passed)*wd.total : sm;
  });
  const deptForePct=pct(deptForecast, deptPlan);
  // KPI за период
  const pays=payCount(periodEntries);
  const avg=avgCheck(periodEntries);
  const talk=sumField(periodEntries,'sipuni.talkMin');

  const delta=deptPct-100; // выполнение относительно плана 100%

      <div class="k-delta ${delta>=0?'up':'down'}">${delta>=0?'▲ +':'▼ '}${delta}% к плану</div></div>

    <div class="kpi"><div class="k-lbl">Средний чек</div><div class="k-val" style="color:var(--teal-d)">${avg>0?compactMoney(avg)+' ₸':'—'}</div></div>
    <div class="kpi"><div class="k-lbl">Время на линии</div><div class="k-val">${talk}<span style="font-size:13px;color:var(--muted)"> мин</span></div><div class="k-sub">Сипуни</div></div>
    <div class="kpi"><div class="k-lbl">Время WhatsApp</div><div class="k-val">${waMin}<span style="font-size:13px;color:var(--muted)"> мин</span></div><div class="k-sub">личный</div></div>

    <div class="kpis" style="margin-top:12px">

  html+=`</div>`;
  v.innerHTML=html;

function blankDraft(mid, date){
  return {id:"e_"+mid+"_"+date, date, managerId:mid,
    sipuni:{talkMin:0,calls:0,success:0,dozvon:0,nedozvon:0},
    wa:{calls:0,timeMin:0}, invoices:0, sales:[]};
}
function loadDraft(mid, date){
  const ex=DB.entries.find(e=>e.managerId===mid && e.date===date);
  ENTRY_DRAFT = ex? JSON.parse(JSON.stringify(ex)) : blankDraft(mid,date);
}
// перенести значения полей формы в черновик (перед сменой даты / сохранением)
function pullForm(){
  if(!ENTRY_DRAFT) return;
  const g=id=>{ const el=document.getElementById(id); return el? (Number(el.value)||0):0; };
  ENTRY_DRAFT.sipuni={talkMin:g('e-talk'),calls:g('e-calls'),success:g('e-success'),dozvon:g('e-dozvon'),nedozvon:g('e-nedozvon')};
  ENTRY_DRAFT.wa={calls:g('e-wacalls'),timeMin:g('e-watime')};
  ENTRY_DRAFT.invoices=g('e-inv');
}
function changeDraftDate(date){
  pullForm();
  loadDraft(SESSION.managerId, date);
  render();
}
function saveEntry(){
  pullForm();
  const d=ENTRY_DRAFT;
  d.id="e_"+d.managerId+"_"+d.date; // одна запись на менеджера на дату
  const idx=DB.entries.findIndex(e=>e.managerId===d.managerId && e.date===d.date);
  if(idx>=0) DB.entries[idx]=JSON.parse(JSON.stringify(d));
  else DB.entries.push(JSON.parse(JSON.stringify(d)));
  save();
  toast("Сохранено ✓");
}
function delSale(i){ pullForm(); ENTRY_DRAFT.sales.splice(i,1); render(); }

function segPick(group, btn){
  document.querySelectorAll('#'+group+' button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function updateSaleNetHint(){
  const el=document.getElementById('s-net-hint'); if(!el) return;
  const amt=Number((document.getElementById('s-amount')||{}).value)||0;
  const pay=(document.getElementById('s-pay')||{}).value||'plain';
  const comm=PAY_COMMISSION[pay]||0;
  if(amt<=0){ el.textContent="Комиссия банка вычитается из суммы (нетто идёт в расчёт дохода)."; return; }
  el.textContent = comm>0
    ? "Нетто к зачёту: "+fmtMoney(amt*(1-comm))+" (комиссия −"+String(comm*100).replace(".",",")+"%)"
    : "Нетто к зачёту: "+fmtMoney(amt)+" (без комиссии)";
}
function addSale(){
  const amount=Number(document.getElementById('s-amount').value)||0;
  if(amount<=0){ toast("Введите сумму"); return; }
  const cat=document.querySelector('#s-cat button.on').dataset.v;
  const prepay=document.querySelector('#s-pre button.on').dataset.v==="1";
  const isReturn=document.querySelector('#s-ret button.on').dataset.v==="1";
  const pay=(document.getElementById('s-pay')||{}).value||'plain';
  ENTRY_DRAFT.sales.push({amount, category:cat, prepay, isReturn, pay});
  closeModal(); render();
}

function renderRating(v){
  const monthSet=new Set(datesForPeriod("month")); // = SEL_MONTH
  const rows=DB.config.managers.map(m=>{
    const e=entriesFor(m.id, monthSet);
    return {id:m.id, name:m.name, val:salesSum(e), pays:payCount(e), plan:managerPlan(m.id)};
  }).sort((a,b)=> b.val - a.val);
  const anySales=rows.some(r=>r.val>0);
  const medals=["🥇","🥈","🥉"];

  let html=`<h2 class="screen-title">Рейтинг</h2>${deviceNote()}
    ${monthNav()}
    <div class="card"><h3>🏆 Рейтинг за ${escapeHtml(monthLabel(SEL_MONTH))}</h3>`;
  if(!anySales){
    html+=`<div class="empty-state">За ${escapeHtml(monthLabel(SEL_MONTH))} продаж пока нет.<br>Как только появятся оплаты — здесь выстроится рейтинг менеджеров 🌟</div>`;
  } else {
    rows.forEach((r,i)=>{
      const p=pct(r.val, r.plan);
      const isMedal=i<3 && r.val>0;
      const plc= isMedal? `<div class="plc medal">${medals[i]}</div>` : `<div class="plc">${i+1}</div>`;
      const top= (i===0 && r.val>0)? " top" : "";
      html+=`<div class="rank${top}">
        ${plc}
        <div class="r-body">
          <div class="r-nm">${escapeHtml(r.name)}</div>
          <div class="r-sub">${p}% плана · ${r.pays} оплат</div>
        </div>
        <div class="r-amt">${fmtMoney(r.val)}</div>
      </div>`;
    });
  }
  html+=`</div>`;

  // Лидеры по месяцам: последние месяцы с продажами (до 12, свежие сверху)
  const monthsSet=new Set();
  DB.entries.forEach(e=>{ if((e.sales||[]).length) monthsSet.add(String(e.date).slice(0,7)); });
  const months=[...monthsSet].sort().reverse().slice(0,12);
  const leaders=months.map(ms=>{
    const ds=new Set(monthDatesStr(ms));
    let top=null;
    DB.config.managers.forEach(m=>{ const val=salesSum(entriesFor(m.id,ds));
      if(!top || val>top.val) top={name:m.name, val}; });
    return {ms, top};
  }).filter(x=> x.top && x.top.val>0);

  html+=`<div class="card"><h3>📅 Лидеры по месяцам</h3>`;
  if(!leaders.length){
    html+=`<div class="empty-state">Пока нет данных по месяцам</div>`;
  } else {
    leaders.forEach(l=>{
      html+=`<div class="mlead">
        <div class="m-mo">${escapeHtml(monthLabel(l.ms))}</div>
        <div class="m-nm">🏆 ${escapeHtml(l.top.name)}</div>
        <div class="m-amt">${fmtMoney(l.top.val)}</div>
      </div>`;
    });
  }
  html+=`</div>`;

  // Доход / Зарплата за выбранный месяц + поле «Премия» на каждого менеджера
  html+=salarySectionHTML(SEL_MONTH);

  v.innerHTML=html;
}

let HIST_PERIOD="month", HIST_MGR="all";
function renderHistory(v){
  const boss=isBoss();
  const dates=new Set(datesForPeriod(HIST_PERIOD));
  let entries=DB.entries.filter(e=>dates.has(e.date));
  if(!boss){ entries=entries.filter(e=>e.managerId===SESSION.managerId); }
  else if(HIST_MGR!=="all"){ entries=entries.filter(e=>e.managerId===HIST_MGR); }
  entries.sort((a,b)=> b.date.localeCompare(a.date) || managerName(a.managerId).localeCompare(managerName(b.managerId)));

  const items=[["today","Сегодня"],["yesterday","Вчера"],["week","Неделя"],["month","Месяц"]];
  let mgrFilter="";
  if(boss){
    mgrFilter=`<label>Менеджер</label><select id="h-mgr" onchange="HIST_MGR=this.value;render()">
      <option value="all"${HIST_MGR==='all'?' selected':''}>Все</option>
      ${DB.config.managers.map(m=>`<option value="${m.id}"${HIST_MGR===m.id?' selected':''}>${escapeHtml(m.name)}</option>`).join("")}
    </select>`;
  }

  let html=`<h2 class="screen-title">История</h2>${deviceNote()}
    <div class="seg">${items.map(([k,l])=>`<button class="${HIST_PERIOD===k?'on':''}" onclick="HIST_PERIOD='${k}';render()">${l}</button>`).join("")}</div>
    ${HIST_PERIOD==="month"? monthNav() : ""}
    ${mgrFilter?`<div class="card">${mgrFilter}</div>`:""}`;

  if(!entries.length){ html+=`<div class="empty-state">Записей за период нет</div>`; v.innerHTML=html; return; }

  // сводка периода
  const sold=salesSum(entries), pays=payCount(entries);
  html+=`<div class="card"><div class="kpis">
    <div class="kpi"><div class="k-lbl">Продажи</div><div class="k-val">${fmtMoney(sold)}</div></div>
    <div class="kpi"><div class="k-lbl">Оплат</div><div class="k-val">${pays}</div></div>
    <div class="kpi"><div class="k-lbl">Ср. чек</div><div class="k-val">${avgCheck(entries)>0?fmtMoney(avgCheck(entries)):'—'}</div></div>
    <div class="kpi"><div class="k-lbl">На линии</div><div class="k-val">${sumField(entries,'sipuni.talkMin')} мин</div></div>
  </div></div>`;

  html+=entries.map(e=>{
    const day=salesSum([e]);
    const s=e.sipuni||{}, w=e.wa||{};
    return `<div class="card" style="padding:12px">
      <div class="lrow" style="border:0;padding:0">
        <div><div class="l-main">${e.date}${boss?' · '+escapeHtml(managerName(e.managerId)):''}</div>
        <div class="l-sub">Дозвоны: успешн. ${s.success||0} · дозв. ${s.dozvon||0} · недозв. ${s.nedozvon||0}</div></div>
        <span class="pill ${day<0?'bad':'good'}">${fmtMoney(day)}</span>
      </div>
      <div class="mini" style="margin-top:8px">
        <div><span>Разговоры</span><b>${s.talkMin||0} мин</b></div>
        <div><span>Звонки</span><b>${s.calls||0}</b></div>
        <div><span>WhatsApp</span><b>${w.calls||0} зв · ${w.timeMin||0} мин</b></div>
        <div><span>Счета</span><b>${e.invoices||0}</b></div>
        <div><span>Оплат</span><b>${payCount([e])}</b></div>
        <div><span>Возвраты</span><b>${(e.sales||[]).filter(x=>x.isReturn).length}</b></div>
      </div></div>`;
  }).join("");
  v.innerHTML=html;

let CAL_MGR=null;
function calMgrId(){
  if(!isBoss()) return SESSION.managerId;
  if(!CAL_MGR || !DB.config.managers.some(m=>m.id===CAL_MGR)) CAL_MGR=(DB.config.managers[0]||{}).id;
  return CAL_MGR;
}
function renderCalendar(v){
  const mid=calMgrId();
  const now=new Date();
  const y=now.getFullYear(), mo=now.getMonth();
  const monthName=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"][mo];
  const first=new Date(y,mo,1);
  let startDow=first.getDay(); startDow=(startDow===0)?6:startDow-1; // Пн=0
  const dim=new Date(y,mo+1,0).getDate();
  const off=DB.daysOff[mid]||[];

  let cells="";
  const dh=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  dh.forEach(d=>cells+=`<div class="dh">${d}</div>`);
  for(let i=0;i<startDow;i++) cells+=`<div class="d empty"></div>`;
  for(let day=1;day<=dim;day++){
    const ds=ymd(new Date(y,mo,day));
    const d=parseYMD(ds);
    let cls="d";
    const hol=isHoliday(ds), we=isWeekend(d), pers=off.includes(ds);
    if(pers) cls+=" pers";
    else if(hol) cls+=" hol";
    else if(we) cls+=" off";
    if(ds===todayStr()) cls+=" today";
    cells+=`<div class="${cls}" onclick="toggleDayOff('${ds}')">${day}</div>`;
  }
  const wd=workingDaysStats(mid);

  let mgrPicker="";
  if(isBoss()){
    mgrPicker=`<label>Календарь менеджера</label>
      <select id="cal-mgr" onchange="CAL_MGR=this.value;render()">
        ${DB.config.managers.map(m=>`<option value="${m.id}"${m.id===mid?' selected':''}>${escapeHtml(m.name)}</option>`).join("")}
      </select>`;
  }

  v.innerHTML=`<h2 class="screen-title">Календарь</h2>${deviceNote()}
    <div class="note"><span>👆</span><span><b>Нажмите на день</b>, чтобы отметить или снять выходной.</span></div>
    ${mgrPicker?`<div class="card">${mgrPicker}</div>`:""}
    <div class="card"><h3>${escapeHtml(managerName(mid))} · ${monthName} ${y}</h3>
      <div class="cal">${cells}</div>
      <div class="legend">
        <span><i style="background:#e9eefb"></i>Рабочий день</span>
        <span><i style="background:#eef1f6"></i>Выходной (сб-вс)</span>
        <span><i style="background:rgba(229,72,77,.45)"></i>Праздник РК</span>
        <span><i style="background:rgba(245,158,11,.5)"></i>Личный выходной</span>
      </div>
    </div>
    <div class="card"><div class="kpis">
      <div class="kpi"><div class="k-lbl">Рабочих дней всего</div><div class="k-val">${wd.total}</div></div>
      <div class="kpi"><div class="k-lbl">Осталось (с сегодня)</div><div class="k-val">${wd.remaining}</div></div>
    </div></div>`;
}
function toggleDayOff(ds){
  const mid=calMgrId();
  const arr=DB.daysOff[mid]||[];
  const i=arr.indexOf(ds);
  if(i>=0) arr.splice(i,1); else arr.push(ds);
  DB.daysOff[mid]=arr; save(); render();
}

      <div class="hint" style="margin-top:-4px">Создаст 3 менеджеров с планами и записи по разным дням текущего месяца: обе категории (Пациенты и Врачи), предоплаты, возвраты, данные Сипуни/WhatsApp — чтобы спидометры и графики сразу были заполнены.</div>
      <button class="btn teal" onclick="fillDemo()">✨ Заполнить демо-данными</button>
      <button class="btn warn" onclick="wipeAll()">🗑 Очистить все данные</button>
    </div>
    <div class="small-note">Данные на этом устройстве (localStorage «salesapp_v1»).<br>Общая база и синхронизация с Сипуни — следующий этап.</div>`;
}

}
function addManager(){

}
function removeManager(id){
  if(DB.config.managers.length<=1){ toast("Нужен хотя бы один"); return; }
  DB.config.managers=DB.config.managers.filter(m=>m.id!==id);

}
// Автосохранение имени сразу при вводе (по потере фокуса / изменению) — надёжнее кнопки
function renameManager(id, val){
  const m=DB.config.managers.find(x=>x.id===id);
  if(!m) return;
  const nv=(val||"").trim();
  if(nv && nv!==m.name){ m.name=nv; save(); toast("Имя сохранено ✓"); }
}
function saveManagers(){
  DB.config.managers.forEach(m=>{
    const el=document.getElementById('nm-'+m.id);
    if(el) m.name=el.value.trim()||m.name;
  });

}
function wipeAll(){
  if(!confirm("Удалить все данные приложения?")) return;
  DB=defaultData(); save(); render();
}

/* демо-данные */
function fillDemo(){
  const base=defaultData();
  base.config.deptPlan=0;
  // план по умолчанию для каждого — 5 000 000 ₸
  base.plans={ m1:{monthPlan:5000000}, m2:{monthPlan:5000000}, m3:{monthPlan:5000000} };
  base.bonus={ m1:{}, m2:{}, m3:{} };
  const PAY_POOL=["plain","plain","plain","kaspi24","kaspi12","robokassa"];
  const now=new Date(); const y=now.getFullYear(), mo=now.getMonth();
  const today=todayStr();
  const managers=["m1","m2","m3"];
  const catPick=i=> i%3===0? "doctors":"patients";
  // записи по прошедшим рабочим дням месяца (и сегодня)
  const dates=monthDates(y,mo).filter(ds=> ds<=today);
  let seed=7;
  const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  managers.forEach((mid,mi)=>{
    dates.forEach(ds=>{
      const d=parseYMD(ds);
      if(isWeekend(d)||isHoliday(ds)) return;
      if(rnd()<0.15) return; // иногда пропуск
      const talk=20+Math.floor(rnd()*90);
      const calls=15+Math.floor(rnd()*30);
      const success=2+Math.floor(rnd()*6);
      const dozvon=3+Math.floor(rnd()*8);
      const nedozvon=Math.floor(rnd()*10);
      const sales=[];
      const nSales=Math.floor(rnd()*3); // 0..2 продажи в день
      for(let k=0;k<nSales;k++){
        const amount=(150+Math.floor(rnd()*40)*10)*1000; // 150k..550k
        // чередуем категории, чтобы обе были представлены; часть — предоплаты
        const pay=PAY_POOL[Math.floor(rnd()*PAY_POOL.length)]; // разные способы оплаты
        sales.push({amount, category: rnd()<0.4?"doctors":"patients", prepay: rnd()<0.5, isReturn:false, pay});
      }
      base.entries.push({
        id:"e_"+mid+"_"+ds, date:ds, managerId:mid,
        sipuni:{talkMin:talk,calls,success,dozvon,nedozvon},
        wa:{calls:Math.floor(rnd()*8), timeMin:Math.floor(rnd()*40)},
        invoices:Math.floor(rnd()*5),
        sales
      });
    });
  });
  // гарантированные возвраты (пара штук), чтобы логика возвратов была видна
  function injectReturn(mid, dayNum, amount, cat){
    const ds=ymd(new Date(y,mo,dayNum));
    if(parseYMD(ds)>now) return;
    let e=base.entries.find(x=>x.managerId===mid && x.date===ds);
    if(!e){ e={id:"e_"+mid+"_"+ds, date:ds, managerId:mid,
      sipuni:{talkMin:30,calls:18,success:3,dozvon:5,nedozvon:4}, wa:{calls:2,timeMin:12}, invoices:2, sales:[]};
      base.entries.push(e); }
    e.sales.push({amount, category:cat, prepay:false, isReturn:true, pay:"plain"});
  }
  injectReturn("m1", Math.min(9, now.getDate()), 180000, "patients");
  injectReturn("m2", Math.min(16, now.getDate()), 250000, "doctors");
  // демо-премия текущего месяца (чтобы был виден расчёт «Премия»)
  base.bonus.m1[curMonthStr()]=50000;
  // пара обращений о помощи
  base.help=[
    {id:"h1",managerId:"m1",date:today,client:"Асель +7 701 …",note:"Сомневается по цене брекетов, нужна поддержка руководителя",resolved:false},
    {id:"h2",managerId:"m3",date:today,client:"Клиника «Смайл»",note:"Хотят договор на обучение врачей",resolved:false}
  ];
  DB=base; save(); ROUTE=isBoss()?"dashboard":"cabinet"; render();
  toast("Демо-данные загружены ✓");
}

  `);
}
function submitHelp(){
  const client=document.getElementById('h-client').value.trim();
  const note=document.getElementById('h-note').value.trim();
  if(!client && !note){ toast("Заполните поля"); return; }
  DB.help.push({id:"h_"+Date.now().toString(36), managerId:SESSION.managerId, date:todayStr(), client, note, resolved:false});
  save(); closeModal(); toast("Отправлено руководителю ✓");
}

/* ============================================================
   UI ХЕЛПЕРЫ (модалка, тост, экранирование, плашка)
   ============================================================ */
function deviceNote(){
  return `<div class="note"><span>ℹ️</span><span><b>Прототип.</b> Данные хранятся на этом устройстве. Общая база и авто-синхронизация с Сипуни будут подключены на следующем этапе.</span></div>`;
}
function showModal(inner){
  closeModal();
  const bg=document.createElement("div");
  bg.className="modal-bg"; bg.id="modal-bg";
  bg.onclick=e=>{ if(e.target===bg) closeModal(); };
  bg.innerHTML=`<div class="modal">${inner}</div>`;
  document.body.appendChild(bg);
  const inp=bg.querySelector("input[autofocus]"); if(inp) setTimeout(()=>inp.focus(),50);
}
function closeModal(){ const m=document.getElementById("modal-bg"); if(m) m.remove(); }
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#1f2740;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;box-shadow:0 8px 24px rgba(31,45,90,.30);opacity:0;transition:opacity .2s";
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity="0",1600);
}
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* старт */
render();
